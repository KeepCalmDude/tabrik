<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تولدت مبارک سپیده</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#ffd089;
    --cream:#fff6e6;
    --peach:#ffcaa8;
    --rose:#ff9d8a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;overflow:hidden;background:#0a0920;}
  body{
    font-family:'Vazirmatn',sans-serif;
    position:fixed;inset:0;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
    user-select:none;
  }

  #stage{position:absolute;inset:0;overflow:hidden;cursor:grab;}
  #stage.dragging{cursor:grabbing;}

  /* آسمان */
  #sky{position:absolute;inset:0;transition:background .12s linear;}

  /* ستاره‌ها */
  #stars{position:absolute;inset:0;pointer-events:none;}
  .star{
    position:absolute;border-radius:50%;background:#fff;
    animation:tw var(--d,3s) ease-in-out infinite alternate;
  }
  @keyframes tw{from{opacity:.15;transform:scale(.7);}to{opacity:1;transform:scale(1);}}

  /* پرتوهای خورشید */
  #rays{
    position:absolute;width:160vmax;height:160vmax;
    left:50%;top:0;transform:translate(-50%,-50%);
    background:repeating-conic-gradient(from 0deg,
      rgba(255,221,150,.0) 0deg,
      rgba(255,221,150,.16) 4deg,
      rgba(255,221,150,.0) 9deg);
    border-radius:50%;
    opacity:0;pointer-events:none;
    -webkit-mask-image:radial-gradient(circle,#000 8%,transparent 60%);
            mask-image:radial-gradient(circle,#000 8%,transparent 60%);
    animation:spin 60s linear infinite;
  }
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

  /* خورشید */
  #sun{
    position:absolute;left:50%;width:118px;height:118px;border-radius:50%;
    transform:translate(-50%,50%);
    background:radial-gradient(circle at 50% 40%,#fffdf4 0%,#ffe9a8 35%,#ffcf72 70%,#ffb24b 100%);
    box-shadow:0 0 60px 24px rgba(255,200,110,.55),0 0 140px 60px rgba(255,170,90,.30);
    pointer-events:none;will-change:bottom;
  }
  #sun::after{
    content:"";position:absolute;inset:-40%;border-radius:50%;
    background:radial-gradient(circle,rgba(255,210,130,.35),transparent 65%);
    animation:breathe 4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.12);opacity:1;}}

  /* تپه‌ها */
  .hills{position:absolute;left:0;width:100%;bottom:0;pointer-events:none;}
  #hillFar{height:30vh;}
  #hillNear{height:20vh;}
  .hills svg{width:100%;height:100%;display:block;}

  /* بوم پخش گلبرگ‌ها و نور */
  #fx{position:absolute;inset:0;pointer-events:none;}

  /* راهنما */
  #hint{
    position:absolute;left:0;right:0;top:14%;text-align:center;
    color:rgba(255,255,255,.86);pointer-events:none;
    transition:opacity .5s;padding:0 24px;
  }
  #hint .big{font-family:'Lalezar';font-size:clamp(26px,7vw,46px);letter-spacing:.5px;}
  #hint .sub{font-weight:300;font-size:clamp(13px,3.6vw,17px);margin-top:6px;opacity:.8;}
  #hint .arrow{font-size:30px;margin-top:14px;animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

  /* پیام تبریک */
  #message{
    position:absolute;left:0;right:0;top:0;bottom:18vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 28px;pointer-events:none;
    opacity:0;
  }
  #message.show{opacity:1;}
  #message .name{
    font-family:'Lalezar';font-size:clamp(64px,22vw,150px);line-height:.95;
    color:#fff8ea;
    text-shadow:0 4px 30px rgba(255,160,80,.55),0 0 70px rgba(255,200,120,.4);
    opacity:0;transform:translateY(40px) scale(.9);
  }
  #message .wish{
    font-family:'Lalezar';font-size:clamp(24px,7.5vw,52px);color:#fff;
    margin-top:6px;text-shadow:0 2px 18px rgba(180,80,40,.5);
    opacity:0;transform:translateY(30px);
  }
  #message .meaning{
    font-weight:400;font-size:clamp(14px,4vw,20px);color:#5a2f1a;
    max-width:560px;margin-top:22px;line-height:2;
    opacity:0;transform:translateY(24px);
  }
  #message .meaning b{font-weight:700;color:#a8431f;}
  .reveal{animation:rise .9s cubic-bezier(.2,.8,.2,1) forwards;}
  @keyframes rise{to{opacity:1;transform:translateY(0) scale(1);}}

  /* دکمه دوباره */
  #replay{
    position:absolute;left:50%;bottom:5.5vh;transform:translateX(-50%);
    font-family:'Vazirmatn';font-weight:500;font-size:16px;
    color:#5a2f1a;background:rgba(255,247,230,.85);
    border:1.5px solid rgba(168,67,31,.45);border-radius:999px;
    padding:11px 26px;cursor:pointer;backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .6s,transform .2s,background .2s;
  }
  #replay.show{opacity:1;pointer-events:auto;}
  #replay:hover{background:#fff;transform:translateX(-50%) scale(1.04);}
  #replay:active{transform:translateX(-50%) scale(.97);}
  #replay:focus-visible{outline:3px solid #a8431f;outline-offset:3px;}

  /* صدا */
  #sound{
    position:absolute;top:16px;left:16px;z-index:5;
    width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
    color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;
    backdrop-filter:blur(4px);
  }
  #sound:focus-visible{outline:2px solid #fff;outline-offset:2px;}

  @media (prefers-reduced-motion:reduce){
    .star,#rays,#sun::after,#hint .arrow{animation:none !important;}
  }
</style>
</head>
<body>
<div id="stage">
  <div id="sky"></div>
  <div id="stars"></div>
  <div id="rays"></div>
  <div id="sun"></div>

  <div class="hills" id="hillFar">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path id="pFar" d="M0,200 C240,120 480,160 720,140 C960,120 1200,180 1440,150 L1440,320 L0,320 Z"></path>
    </svg>
  </div>
  <div class="hills" id="hillNear">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path id="pNear" d="M0,240 C220,300 520,210 760,250 C1000,290 1240,230 1440,260 L1440,320 L0,320 Z"></path>
    </svg>
  </div>

  <canvas id="fx"></canvas>

  <div id="hint">
    <div class="big">خورشید رو بکش بالا ☀︎</div>
    <div class="sub">تا سپیده‌ی صبح بدمه… (یا روی صفحه ضربه بزن)</div>
    <div class="arrow">↑</div>
  </div>

  <div id="message">
    <div class="name" id="mName">سپیده</div>
    <div class="wish" id="mWish">تولدت مبارک ✦</div>
    <div class="meaning" id="mMeaning">
      اسمت یعنی <b>اولین روشنایی صبح</b>؛ و تو هم دقیقاً همون‌قدر گرم و امیدبخشی.
      <br>آرزو می‌کنم سال تازه‌ات پر باشه از صبح‌های روشن، خنده‌های از ته دل،
      و آرزوهایی که یکی‌یکی طلوع می‌کنن. 🌅
    </div>
  </div>

  <button id="sound" aria-label="صدا">♪</button>
  <button id="replay">دوباره طلوع کن ↻</button>
</div>

<script>
(function(){
  const stage=document.getElementById('stage');
  const sky=document.getElementById('sky');
  const starsBox=document.getElementById('stars');
  const sun=document.getElementById('sun');
  const rays=document.getElementById('rays');
  const hint=document.getElementById('hint');
  const message=document.getElementById('message');
  const replay=document.getElementById('replay');
  const soundBtn=document.getElementById('sound');
  const pFar=document.getElementById('pFar');
  const pNear=document.getElementById('pNear');
  const fx=document.getElementById('fx');
  const ctx=fx.getContext('2d');
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  let W,H,horizonY;
  function size(){
    W=fx.width=innerWidth; H=fx.height=innerHeight;
    horizonY=H*0.72;                // خط افق
    layoutSun();
  }

  // ---- ستاره‌ها ----
  (function makeStars(){
    const n=window.innerWidth<600?90:140;
    let html='';
    for(let i=0;i<n;i++){
      const s=Math.random()*2+1;
      html+=`<span class="star" style="left:${Math.random()*100}%;top:${Math.random()*70}%;
        width:${s}px;height:${s}px;--d:${(2+Math.random()*3).toFixed(1)}s;
        animation-delay:${(Math.random()*3).toFixed(1)}s"></span>`;
    }
    starsBox.innerHTML=html;
  })();

  // ---- درون‌یابی رنگ آسمان شب -> سپیده‌دم ----
  const night=[[10,9,32],[26,18,64],[45,27,82]];   // top, mid, lower
  const dawn =[[74,127,181],[246,160,122],[255,208,137]];
  const mix=(a,b,t)=>`rgb(${a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(',')})`;

  let progress=0, target=0;

  function layoutSun(){
    // خورشید از زیر افق تا نزدیک بالای آسمان بالا می‌آید
    const start=H+70, end=H*0.18;
    const y=start+(end-start)*progress;
    sun.style.bottom=(H-y)+'px';
    rays.style.top=y+'px';
  }

  function render(){
    const p=progress;
    sky.style.background=`linear-gradient(180deg,${mix(night[0],dawn[0],p)} 0%,
      ${mix(night[1],dawn[1],p*1.0)} 48%,${mix(night[2],dawn[2],p)} 100%)`;
    starsBox.style.opacity=Math.max(0,1-p*1.5);
    rays.style.opacity=Math.min(.9,p*1.1);
    sun.style.opacity=Math.min(1,p*1.6);
    // تپه‌ها از تقریباً سیاه به قهوه‌ای گرم
    pFar.setAttribute('fill', mix([22,18,46],[120,72,58],p));
    pNear.setAttribute('fill', mix([8,7,24],[74,40,30],p));
    layoutSun();
  }

  // حلقه‌ی نرم برای رسیدن progress به target
  let celebrated=false;
  function loop(){
    progress+=(target-progress)*0.12;
    if(Math.abs(target-progress)<0.001) progress=target;
    render();
    if(!celebrated && progress>0.9){ celebrate(); }
    drawFX();
    requestAnimationFrame(loop);
  }

  // ---- تعامل: کشیدن خورشید بالا ----
  let dragging=false, startY=0, startP=0, moved=false;
  function bump(p){ target=Math.max(target,Math.min(1,p)); if(target>0) hideHint(); }

  function down(e){
    dragging=true; moved=false; stage.classList.add('dragging');
    startY=(e.touches?e.touches[0].clientY:e.clientY);
    startP=target;
  }
  function move(e){
    if(!dragging) return;
    const y=(e.touches?e.touches[0].clientY:e.clientY);
    if(Math.abs(y-startY)>4) moved=true;
    const delta=(startY-y)/(H*0.6);        // کشیدن بالا => افزایش
    bump(startP+delta);
  }
  function up(){
    if(dragging && !moved){ bump(target+0.22); } // ضربه‌ی ساده هم بالا می‌برد
    dragging=false; stage.classList.remove('dragging');
  }
  stage.addEventListener('mousedown',down);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
  stage.addEventListener('touchstart',down,{passive:true});
  window.addEventListener('touchmove',move,{passive:true});
  window.addEventListener('touchend',up);

  let hinted=false;
  function hideHint(){ if(hinted)return; hinted=true; hint.style.opacity=0; }

  // ---- جشن ----
  function celebrate(){
    if(celebrated)return; celebrated=true;
    target=1;
    message.classList.add('show');
    const seq=[['mName',0],['mWish',220],['mMeaning',480]];
    seq.forEach(([id,d])=>setTimeout(()=>document.getElementById(id).classList.add('reveal'),d));
    burst();
    setTimeout(()=>{replay.classList.add('show');},1400);
    chime();
    emitting=true;
    setTimeout(()=>emitting=false,4200); // پخش ملایم گلبرگ ادامه دارد سپس متوقف می‌شود
  }

  // ---- ذرات نور و گلبرگ ----
  const parts=[];
  const COLORS=['#ffd089','#ffb877','#ff9d8a','#ffe7c2','#ffc7a8','#fff3d6'];
  let emitting=false;
  function spawn(x,y,strong){
    const petal=Math.random()<0.5;
    parts.push({
      x,y,
      vx:(Math.random()-0.5)*(strong?6:1.4),
      vy:strong?(-Math.random()*7-2):(Math.random()*1+0.6),
      g:0.06+Math.random()*0.05,
      r:petal?(5+Math.random()*7):(2+Math.random()*3),
      rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.15,
      sway:Math.random()*Math.PI*2,
      petal, c:COLORS[(Math.random()*COLORS.length)|0],
      life:1, decay:0.004+Math.random()*0.004
    });
  }
  function burst(){
    const cx=W/2, cy=H*0.32;
    for(let i=0;i<140;i++) spawn(cx+(Math.random()-0.5)*80, cy+(Math.random()-0.5)*40,true);
  }
  function drawFX(){
    ctx.clearRect(0,0,W,H);
    if(emitting && parts.length<260){
      for(let i=0;i<3;i++) spawn(Math.random()*W,-10,false);
    }
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];
      p.vy+=p.g; p.sway+=0.03;
      p.x+=p.vx+Math.sin(p.sway)*0.6; p.y+=p.vy; p.rot+=p.vr; p.life-=p.decay;
      if(p.life<=0||p.y>H+30){ parts.splice(i,1); continue; }
      ctx.save();
      ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c;
      if(p.petal){
        ctx.beginPath();
        ctx.ellipse(0,0,p.r,p.r*0.5,0,0,Math.PI*2);
        ctx.fill();
      }else{
        ctx.shadowColor=p.c; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  }

  // ---- صدای ملایم طلوع ----
  let audioOn=true, actx=null;
  soundBtn.onclick=()=>{ audioOn=!audioOn; soundBtn.textContent=audioOn?'♪':'♪̸'; soundBtn.style.opacity=audioOn?1:.5; };
  function chime(){
    if(!audioOn)return;
    try{
      actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const notes=[523.25,659.25,783.99,1046.5]; // C E G C
      notes.forEach((f,i)=>{
        const o=actx.createOscillator(),g=actx.createGain();
        o.type='sine'; o.frequency.value=f;
        const t=actx.currentTime+i*0.16;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.18,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.0001,t+1.1);
        o.connect(g); g.connect(actx.destination);
        o.start(t); o.stop(t+1.2);
      });
    }catch(e){}
  }

  // ---- دوباره ----
  replay.onclick=()=>{
    celebrated=false; emitting=false; target=0; progress=0;
    parts.length=0;
    message.classList.remove('show');
    ['mName','mWish','mMeaning'].forEach(id=>document.getElementById(id).classList.remove('reveal'));
    replay.classList.remove('show');
    hinted=false; hint.style.opacity=1;
  };

  // اگر حرکت کم بود ساده‌سازی: کاربری که حرکت رو دوست نداره با اولین ضربه مستقیم جشن می‌گیره
  if(reduce){ stage.addEventListener('click',()=>{ if(!celebrated) celebrate(); },{once:false}); }

  addEventListener('resize',size);
  size(); render(); loop();
})();
</script>
</body>
</html>
